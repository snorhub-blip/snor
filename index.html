<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNOR Installer</title>

<script type="module" src="https://unpkg.com/esp-web-tools@10/dist/web/install-button.js?module"></script>

<style>
body{
  margin:0;
  background:#0b0b0b;
  color:#fff;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}
.box{
  width:420px;
  text-align:center;
  padding:30px;
  border-radius:20px;
  background:#111;
  border:1px solid #2a2a2a;
}
h1{
  font-size:32px;
  margin-bottom:5px;
}
.latest{
  color:#22c55e;
  font-weight:bold;
  margin-bottom:8px;
}
.sub{
  color:#9ca3af;
  font-size:14px;
  margin-bottom:15px;
}
button{
  width:100%;
  padding:15px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  font-size:16px;
  cursor:pointer;
}
.install{
  background:#22c55e;
  color:black;
  font-weight:bold;
}
.old{
  background:#1b1b1b;
  color:white;
  border:1px solid #333;
}
.beta{
  background:#16351f;
  color:#d1fae5;
  border:1px solid #22c55e;
}
.note{
  margin-top:14px;
  color:#fbbf24;
  font-size:13px;
  line-height:1.5;
}
.arrow{
  margin-top:15px;
  cursor:pointer;
  color:#22c55e;
}
.hidden{
  display:none;
}
</style>
</head>

<body>

<div class="box">

<h1>SNOR Installer</h1>
<div class="latest">Latest Stable: v1.1.0</div>
<div class="sub">Cardputer beta is available below for testing.</div>

<!-- Latest install -->
<esp-web-install-button id="installer" manifest="manifest.json"></esp-web-install-button>

<div class="note">
  Stable install is selected by default.<br>
  Use the beta option below only for Cardputer testing.
</div>

<div class="arrow" onclick="toggle()">▼ More Versions</div>

<div id="old" class="hidden">

<button class="old beta" onclick="setVersion('manifest_cardputer_beta.json', 'Cardputer Beta selected. Click Install to flash the beta build.')">
Install Cardputer Beta
</button>

<button class="old" onclick="setVersion('manifest_v1.json', 'v1.0.0 selected. Click Install to continue.')">
Install v1.0.0
</button>

</div>

</div>

<script>
function toggle(){
  const el = document.getElementById("old");
  el.classList.toggle("hidden");
}

function setVersion(manifest, message){
  const btn = document.getElementById("installer");
  btn.setAttribute("manifest", manifest);
  alert(message || "Selected version ready. Click Install.");
}
</script>

</body>
</html>
